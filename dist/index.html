<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-C++ IDE</title>
  <script type="module" crossorigin src="/assets/index-D1XpzXwF.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BXDkYhN-.css">
</head>
<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <button id="btn-lex" class="btn primary">▶ Ejecutar Análisis Léxico</button>
        <button id="btn-compile" class="btn">Compilar todo</button>
        <button id="btn-clear" class="btn">Limpiar Consola</button>
    </div>

    <!-- Main Content Area -->
    <div class="main-container">
        
        <!-- Activity Bar -->
        <div class="activity-bar">
            <div class="activity-icon active" title="Explorador">📄</div>
            <div class="activity-icon" title="Consola">💻</div>
            <div class="activity-icon" title="Tabla de Símbolos">🔣</div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">Archivos de Prueba</div>
            <ul class="file-list">
                <li class="file-item active">📄 main.mc</li>
            </ul>
        </div>

        <!-- Editor and Bottom Panel Wrapper -->
        <div class="editor-container">
            <!-- Editor Tabs -->
            <div class="editor-tabs">
                <div class="editor-tab active">main.mc</div>
            </div>

            <!-- Code Editor Area -->
            <div class="editor-content">
                <div class="line-numbers" id="line-numbers"></div>
                <textarea id="code-editor" class="textarea-editor" spellcheck="false">int main() {
    int x = 10;
    float y = 3.14;
    return 0;
}</textarea>
            </div>

            <!-- Bottom Panel -->
            <div class="bottom-panel">
                <div class="panel-tabs">
                    <div class="panel-tab active" data-target="tokens">Tokens</div>
                    <div class="panel-tab" data-target="symbols">Tabla de Símbolos</div>
                    <div class="panel-tab" data-target="syntax">Árbol Sintáctico</div>
                    <div class="panel-tab" data-target="problems">Problemas / Errores</div>
                </div>

                <!-- Tokens Panel -->
                <div id="tokens-panel" class="panel-content">
                    <table id="tokens-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Lexema</th>
                                <th>Categoría Léxica</th>
                                <th>Línea</th>
                                <th>Columna</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Tokens inyectados dinámicamente -->
                        </tbody>
                    </table>
                </div>

                <!-- Symbols Panel -->
                <div id="symbols-panel" class="panel-content hidden">
                    <table id="symbols-table">
                        <thead>
                            <tr>
                                <th>Identificador</th>
                                <th>Tipo</th>
                                <th>Ámbito</th>
                                <th>Posición Memoria</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Símbolos inyectados dinámicamente -->
                        </tbody>
                    </table>
                </div>

                <!-- Syntax Tree Panel -->
                <div id="syntax-panel" class="panel-content hidden">
                    <pre id="syntax-tree-content"></pre>
                </div>

                <!-- Problems Panel -->
                <div id="problems-panel" class="panel-content hidden">
                    <div id="problems-content"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Vite entry point -->
</body>
</html>
